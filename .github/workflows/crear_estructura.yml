name: Inicializar Estructura de Carpetas

# Permite ejecutar el script manualmente desde la pestaña "Actions"
on: workflow_dispatch 

# Da permisos al bot de GitHub para modificar el repositorio
permissions:
  contents: write 

jobs:
  crear-carpetas:
    runs-on: windows-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Ejecutar el archivo .bat
        # Cambia 'crear_estructura.bat' por el nombre real de tu archivo
        run: .\crear_estructura.bat 

      - name: Guardar los cambios en GitHub (Commit y Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: creacion automatica de estructura de carpetas" || echo "No hay cambios nuevos"
          git push
